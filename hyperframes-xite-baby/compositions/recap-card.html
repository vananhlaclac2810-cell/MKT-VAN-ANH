<template id="recap-card-template">
  <div data-composition-id="recap-card" data-start="0" data-width="1080" data-height="1920">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      
:root {
  --bg-deep: #0a0815;
  --bg-mid: #161229;
  --bg-card: #1f1a3d;
  --border-glow: rgba(106, 155, 204, 0.3);
  --accent-orange: #d97757;
  --accent-cyan: #4dd9d9;
  --accent-purple: #a774d9;
  --accent-green: #5dd97a;
  --ink: #faf9f5;
  --ink-mute: #a8a4c4;
  --glow-cyan: 0 0 24px rgba(77, 217, 217, 0.55);
  --glow-orange: 0 0 24px rgba(217, 119, 87, 0.55);
  --glow-purple: 0 0 24px rgba(167, 116, 217, 0.55);
  --glow-green: 0 0 24px rgba(93, 217, 122, 0.55);
}

      [data-composition-id="recap-card"] {
        width: 100%; height: 100%;
        background: radial-gradient(ellipse 1200px 800px at 50% 30%, var(--bg-mid) 0%, var(--bg-deep) 70%);
        color: var(--ink);
        position: relative; overflow: hidden;
        font-family: 'Be Vietnam Pro', sans-serif;
      }
      [data-composition-id="recap-card"] .particles { position: absolute; inset: 0; z-index: 1; pointer-events: none; will-change: transform, opacity; }
      [data-composition-id="recap-card"] .particles circle { will-change: transform, opacity; }
      [data-composition-id="recap-card"] .grid-bg {
        position: absolute; inset: 0; z-index: 0; opacity: 0.25;
        background-image:
          linear-gradient(rgba(106, 155, 204, 0.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(106, 155, 204, 0.12) 1px, transparent 1px);
        background-size: 60px 60px; pointer-events: none;
      }
      [data-composition-id="recap-card"] .vignette {
        position: absolute; inset: 0; z-index: 2; pointer-events: none;
        background: radial-gradient(ellipse 800px 600px at 50% 50%, transparent 30%, var(--bg-deep) 100%);
        opacity: 0.4;
      }
      [data-composition-id="recap-card"] .scene-content {
        position: relative; z-index: 5;
        width: 100%; height: 100%;
        padding: 200px 50px 320px;
        box-sizing: border-box;
        display: flex; flex-direction: column;
        align-items: center; justify-content: flex-start;
      }
      [data-composition-id="recap-card"] .topic-pill {
        display: inline-flex; align-items: center; gap: 10px;
        padding: 12px 24px;
        background: rgba(31, 26, 61, 0.85);
        border: 1.5px solid var(--accent-orange);
        border-radius: 999px;
        font-weight: 700; font-size: 22px; letter-spacing: 0.18em;
        text-transform: uppercase; color: var(--accent-orange);
        margin-bottom: 18px;
        backdrop-filter: blur(10px);
        will-change: transform, opacity;
        box-shadow: var(--glow-orange);
      }
      [data-composition-id="recap-card"] .topic-pill .num {
        display: inline-flex; align-items: center; justify-content: center;
        width: 32px; height: 32px;
        background: var(--accent-orange); color: var(--bg-deep);
        border-radius: 50%; font-weight: 900; font-size: 20px;
      }
      [data-composition-id="recap-card"] .brand-title {
        font-family: 'Be Vietnam Pro', sans-serif;
        font-weight: 900; font-size: 110px; line-height: 0.92;
        letter-spacing: -0.04em; text-transform: uppercase;
        margin: 0 0 28px; text-align: center;
        text-shadow: 0 0 40px rgba(217, 119, 87, 0.4);
        will-change: transform, opacity;
      }
      [data-composition-id="recap-card"] .brand-title .accent {
        background: linear-gradient(135deg, var(--accent-orange) 0%, #f4a384 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      [data-composition-id="recap-card"] .brand-title .word {
        display: inline-block; will-change: transform, opacity; margin-right: 0.18em;
      }
      
        [data-composition-id="recap-card"] .team-board { width: 720px; margin: 6px auto 14px; background: rgba(31, 26, 61, 0.92); border: 1.5px solid var(--border-glow); border-radius: 22px; padding: 18px; backdrop-filter: blur(12px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); will-change: transform, opacity; }
        [data-composition-id="recap-card"] .board-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 14px; border-bottom: 1px solid rgba(106, 155, 204, 0.15); }
        [data-composition-id="recap-card"] .bh-label { font-size: 16px; font-weight: 700; color: var(--ink-mute); letter-spacing: 0.1em; text-transform: uppercase; }
        [data-composition-id="recap-card"] .bh-stat { font-weight: 800; font-size: 28px; color: var(--accent-orange); font-variant-numeric: tabular-nums; }
        [data-composition-id="recap-card"] .team-grid { position: relative; height: 170px; margin-top: 14px; }
        [data-composition-id="recap-card"] .team-dot { position: absolute; width: 22px; height: 22px; border-radius: 50%; background: var(--accent-cyan); box-shadow: 0 0 8px rgba(77, 217, 217, 0.5); will-change: transform, opacity; }
        [data-composition-id="recap-card"] .mult-stage { display: flex; align-items: center; gap: 18px; margin: 8px 0; }
        [data-composition-id="recap-card"] .mult-pill { display: inline-flex; align-items: baseline; gap: 4px; padding: 16px 28px; background: linear-gradient(135deg, var(--accent-orange) 0%, #f4a384 100%); color: var(--bg-deep); border-radius: 22px; box-shadow: var(--glow-orange); }
        [data-composition-id="recap-card"] .mult-x { font-size: 36px; font-weight: 800; }
        [data-composition-id="recap-card"] .mult-num { font-size: 80px; line-height: 0.85; font-weight: 900; letter-spacing: -0.04em; font-variant-numeric: tabular-nums; }
        [data-composition-id="recap-card"] .mult-text { font-size: 22px; font-weight: 600; color: var(--ink); text-align: left; line-height: 1.3; }
        [data-composition-id="recap-card"] .mult-text strong { color: var(--accent-orange); font-weight: 800; }
        [data-composition-id="recap-card"] .recap-tag { margin-top: 14px; font-style: italic; font-weight: 600; font-size: 24px; color: var(--accent-cyan); will-change: transform, opacity; }

    </style>

    <div class="grid-bg"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const ROOT = '[data-composition-id="recap-card"]';

      // Particles drift
      tl.fromTo(ROOT + ' .particles circle',
        { scale: 0, opacity: 0 },
        { scale: 1, opacity: 0.6, duration: 1.2, ease: "power2.out", stagger: 0.05 },
        0
      );
      tl.to(ROOT + ' .particles circle', {
        y: -20, duration: 2.5, ease: "sine.inOut",
        yoyo: true, repeat: 4, stagger: { each: 0.1, yoyo: true },
      }, 1.0);

      // Topic pill
      tl.from(ROOT + ' .topic-pill', {
        y: -30, scale: 0.8, opacity: 0, duration: 0.5, ease: "back.out(1.8)",
      }, 0.2);

      // Brand title slam
      tl.from(ROOT + ' .brand-title .word', {
        y: 80, opacity: 0, scale: 0.7, duration: 0.55,
        ease: "back.out(1.6)", stagger: 0.08,
      }, 0.45);

      tl.from(ROOT + ' .team-board', { y: 30, opacity: 0, scale: 0.95, duration: 0.55, ease: "back.out(1.5)" }, 1.0);
        tl.from(ROOT + ' .team-dot', { scale: 0, opacity: 0, duration: 0.3, ease: "back.out(1.6)", stagger: { each: 0.012, from: "random" } }, 1.4);
        const upObj = { v: 0 };
        tl.to(upObj, { v: 100, duration: 1.0, ease: "power2.out", onUpdate: () => { const el = document.querySelector(ROOT + ' #team-num'); if (el) el.textContent = Math.round(upObj.v); } }, 1.4);
        const dnObj = { v: 100 };
        tl.to(dnObj, { v: 5, duration: 1.6, ease: "power3.inOut", onUpdate: () => { const el = document.querySelector(ROOT + ' #team-num'); if (el) el.textContent = Math.round(dnObj.v); } }, 2.6);
        tl.to(ROOT + ' .team-dot:nth-child(n+11)', { backgroundColor: 'rgba(168, 164, 196, 0.2)', boxShadow: 'none', scale: 0.6, duration: 1.4, ease: "power2.inOut", stagger: 0.025 }, 2.6);
        tl.from(ROOT + ' .mult-pill', { scale: 0.4, opacity: 0, rotation: -10, duration: 0.6, ease: "back.out(2.2)" }, 4.2);
        tl.to(ROOT + ' .mult-pill', { scale: 1.06, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 3 }, 4.85);
        tl.from(ROOT + ' .mult-text', { x: -30, opacity: 0, duration: 0.45, ease: "power3.out" }, 4.5);
        tl.from(ROOT + ' .recap-tag', { y: 14, opacity: 0, duration: 0.5 }, 5.0);
        
      window.__timelines["recap-card"] = tl;
    </script>
