<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>DR.MAYA · 4 NGUY CƠ XÍ TÈ — Hoàng AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0815;
      --brand-bg: #faf9f5;
      --brand-ink: #141413;
      --brand-accent: #d97757;
    }
    html, body {
      margin: 0; padding: 0;
      background: var(--brand-ink);
      font-family: 'Be Vietnam Pro', sans-serif;
    }
    [data-composition-id="root"] {
      position: relative; width: 1080px; height: 1920px;
      overflow: hidden; background: #000;
    }
    /* SOURCE VIDEO */
    #v-source {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 25%;
      z-index: 1;
      will-change: transform, height, top, object-position;
    }
    /* SPLIT MOUNT */
    .split-mount {
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      width: 1080px !important; height: 960px !important;
      overflow: hidden !important;
      background: var(--bg-deep);
      z-index: 40;
    }
    .split-mount > [data-composition-id] {
      transform: scale(0.5);
      transform-origin: top center;
      width: 1080px !important; height: 1920px !important;
      position: absolute !important;
      left: 50%; margin-left: -540px;
    }
    /* DIVIDER */
    #split-divider {
      position: absolute; top: 50%; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, rgba(217,119,87,0.8) 20%, rgba(77,217,217,0.9) 50%, rgba(217,119,87,0.8) 80%, transparent 100%);
      box-shadow: 0 0 12px rgba(217,119,87,0.5);
      z-index: 50; opacity: 0;
      will-change: opacity, transform;
    }
    /* HEADER PILL */
    .header-pill {
      position: absolute; top: 64px; left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex; align-items: center; gap: 14px;
      padding: 16px 30px;
      background: rgba(20,20,19,0.78);
      border: 1.5px solid rgba(250,249,245,0.18);
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }
    .header-pill .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--brand-accent);
      box-shadow: 0 0 0 4px rgba(217,119,87,0.18);
    }
    .header-pill .label {
      font-weight: 600; font-size: 30px;
      letter-spacing: 0.04em;
      color: var(--brand-bg);
      text-transform: uppercase;
    }
    /* FOOTER */
    .brand-mark {
      position: absolute; left: 50%; bottom: 70px;
      transform: translateX(-50%);
      z-index: 45;
      font-weight: 600; font-size: 30px;
      letter-spacing: 0.04em;
      color: var(--brand-bg);
      opacity: 0.92;
      padding: 10px 22px;
      background: rgba(20,20,19,0.55);
      border-radius: 999px;
      backdrop-filter: blur(6px);
    }
    .brand-mark .at { color: var(--brand-accent); margin-right: 2px; }
  </style>
</head>
<body>
  <div data-composition-id="root" data-start="0" data-width="1080" data-height="1920">
    <video id="v-source" data-start="5.38" data-duration="44.70"
           data-track-index="0" src="source.mp4" muted playsinline style="z-index: 13"></video>
    <audio id="a-source" data-start="0" data-duration="44.70"
           data-track-index="1" data-volume="1" src="source.mp4" style="z-index: 12"></audio>

    <!-- 6 SFX (timing customize per video) -->
    <audio id="sfx-hook"  data-start="0"      data-duration="0.6" data-track-index="20" data-volume="0.32" src="sfx/camera-flash.mp3" style="z-index: 9"></audio>

    <div id="split-divider" style="z-index: 1"></div>

    <div id="brand-mark" class="clip brand-mark"
         data-start="0" data-duration="44.70" data-track-index="2" style="z-index: 11">
      <span class="at">@</span>drmaya
    </div>

    <div id="header-pill" class="clip header-pill"
         data-start="0" data-duration="44.70" data-track-index="3" style="z-index: 10">
      <div class="dot"></div>
      <div class="label">DR.MAYA · 4 NGUY CƠ XÍ TÈ</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // --- Header pill entrance ---
      tl.from("#header-pill", { y: -40, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.15);
      tl.from("#brand-mark", { opacity: 0, duration: 0.7, ease: "power2.out" }, 0.6);

      // --- SPLIT-SCREEN ↔ FULL-FACE TRANSITIONS ---
      const SCENES = [
        { id: "fs-lesson-1", start: 15.40, brollEnd: 19.68, hasBreath: false },
        { id: "fs-lesson-2", start: 19.68, brollEnd: 23.50, hasBreath: false },
        { id: "fs-lesson-3", start: 23.50, brollEnd: 25.92, hasBreath: false },
        { id: "fs-lesson-4", start: 25.92, brollEnd: 29.34, hasBreath: false },
        { id: "recap-card", start: 29.34, brollEnd: 36.50, hasBreath: true },
        { id: "fs-cta", start: 39.04, brollEnd: 41.50, hasBreath: true }
      ];
      const TRANSITION_DUR = 0.45;
      const PRE_SHRINK = 0.3;

      function goSplit(t) {
        tl.to("#v-source", {
          height: "50%", top: "50%",
          objectPosition: "center 15%",
          duration: TRANSITION_DUR, ease: "power2.inOut",
        }, t);
        tl.to("#split-divider", { opacity: 1, duration: 0.35 }, t + 0.1);
        tl.to('[data-composition-id="captions"] .caption-stage', {
          bottom: 920, duration: TRANSITION_DUR, ease: "power2.inOut",
        }, t);
      }

      function goFull(t) {
        tl.to("#v-source", {
          height: "100%", top: "0%",
          objectPosition: "center 25%",
          duration: TRANSITION_DUR, ease: "power2.inOut",
        }, t);
        tl.to("#split-divider", { opacity: 0, duration: 0.3 }, t);
        tl.to('[data-composition-id="captions"] .caption-stage', {
          bottom: 160, duration: TRANSITION_DUR, ease: "power2.inOut",
        }, t);
      }

      tl.set('[data-composition-id="captions"] .caption-stage', { bottom: 160 }, 0);

      SCENES.forEach((sc) => {
        goSplit(sc.start - PRE_SHRINK);
        if (sc.hasBreath) {
          goFull(sc.brollEnd);
        }
      });

      // Divider pulse loop
      tl.to("#split-divider", {
        scaleY: 1.4, duration: 1.2, ease: "sine.inOut",
        yoyo: true, repeat: 60, transformOrigin: "center center",
      }, 15.20);

      window.__timelines["root"] = tl;
    </script>

    <!-- ============ SCENE MOUNTS (split-screen, track 40-47) ============ -->
    <div class="clip split-mount" data-composition-src="compositions/fs-lesson-1.html" data-start="15.40" data-duration="4.28" data-composition-id="fs-lesson-1" data-track-index="40" style="z-index: 8"></div>
    <div class="clip split-mount" data-composition-src="compositions/fs-lesson-2.html" data-start="19.68" data-duration="3.82" data-composition-id="fs-lesson-2" data-track-index="41" style="z-index: 7"></div>
    <div class="clip split-mount" data-composition-src="compositions/fs-lesson-3.html" data-start="23.50" data-duration="2.42" data-composition-id="fs-lesson-3" data-track-index="42" style="z-index: 6"></div>
    <div class="clip split-mount" data-composition-src="compositions/fs-lesson-4.html" data-start="25.92" data-duration="3.42" data-composition-id="fs-lesson-4" data-track-index="43" style="z-index: 5"></div>
    <div class="clip split-mount" data-composition-src="compositions/recap-card.html" data-start="29.34" data-duration="7.16" data-composition-id="recap-card" data-track-index="44" style="z-index: 4"></div>
    <div class="clip split-mount" data-composition-src="compositions/fs-cta.html" data-start="39.04" data-duration="2.46" data-composition-id="fs-cta" data-track-index="45" style="z-index: 3"></div>

    <!-- ============ CAPTIONS LAST (track 60 + z-index 100) ============ -->
    <div class="clip captions-mount"
         data-composition-src="compositions/captions.html"
         data-start="0" data-duration="44.70"
         data-composition-id="captions"
         data-track-index="60"
         style="z-index: 2"></div>
  </div>
</body>
</html>
