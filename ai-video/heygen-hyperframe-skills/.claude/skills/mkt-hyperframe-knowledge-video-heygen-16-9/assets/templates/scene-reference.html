<!doctype html>
<!--
  ============================================================================
  CANONICAL SCENE REFERENCE — 1200×1080 slide-pane sub-composition (hero pattern).
  DR.MAYA mom-&-baby aesthetic: BRIGHT cream/yellow bg, green + gold, soft
  illustrations. This is the DNA every scene sub-agent must mirror. PROVEN:
  renders inside a .slide-mount, no text overflow, PIP re-centers cleanly.
  Key mechanics to copy verbatim (only content/accents/layout change per scene):
    - Full standalone HTML doc, loaded via data-composition-src (NOT inline <template>).
    - Root: <div data-composition-id="scene-NN-slug" data-width="1200" data-height="1080">
    - ALL css scoped under [data-composition-id="scene-NN-slug"]
    - NO <script src=...gsap...> — relies on the master's global gsap.
    - mulberry32 PRNG, unique seed 0x5cNN. No Math.random().
    - gsap.fromTo() entrances, finite repeats, window.__timelines["scene-NN-slug"]=tl (paused).
    - meta-badge top:92px left:56px (BELOW master brand-mark). NO top-right wordmark
      (that corner is the avatar's). NO element past x≈1100px in split.
    - Content-matching illustration in assets/img/ (local, onerror-hidden).
    - LIGHT bg always — never dark. Soft shadows, never neon glow.
  ============================================================================
-->
<html lang="vi">
<head>
<meta charset="utf-8" />
<title>Scene reference — 1200×1080 hero (slide pane) — Dr.Maya</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #FFFBEE; }
  [data-composition-id="scene-01-hook"] {
    width: 1200px; height: 1080px;
    position: relative; overflow: hidden;
    background:
      radial-gradient(ellipse at 50% 12%, #FFFFFF 0%, transparent 55%),
      radial-gradient(ellipse at 82% 92%, rgba(245,196,51,0.20) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, #FFFDF4 0%, #FFF6DD 60%, #FCEDC4 100%);
    color: #2C3A30;
    font-family: 'Be Vietnam Pro', system-ui, sans-serif;
  }

  [data-composition-id="scene-01-hook"] .bokeh { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  [data-composition-id="scene-01-hook"] .bokeh span { position: absolute; display: block; border-radius: 50%; opacity: 0; }

  [data-composition-id="scene-01-hook"] .leaf { position: absolute; z-index: 1; opacity: 0; }

  [data-composition-id="scene-01-hook"] .meta-badge {
    position: absolute; top: 92px; left: 56px; z-index: 10;
    padding: 11px 18px;
    font: 800 18px/1 'Be Vietnam Pro', sans-serif;
    letter-spacing: 0.12em; text-transform: uppercase; color: #0A6F3E;
    background: #FFFFFF; border: 1px solid #EFE2B6;
    border-radius: 999px; box-shadow: 0 6px 18px rgba(180,150,40,0.12); opacity: 0;
  }
  [data-composition-id="scene-01-hook"] .meta-badge .dot { color: #F2B705; margin-right: 8px; }

  [data-composition-id="scene-01-hook"] .stage {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 150px 90px 150px; box-sizing: border-box; text-align: center;
  }

  [data-composition-id="scene-01-hook"] .eyebrow {
    font: 800 22px/1 'Be Vietnam Pro', sans-serif;
    letter-spacing: 0.16em; text-transform: uppercase; color: #C99A12;
    margin-bottom: 28px; opacity: 0;
  }

  [data-composition-id="scene-01-hook"] .hero {
    font: 900 100px/0.98 'Be Vietnam Pro', sans-serif;
    letter-spacing: -0.02em; text-transform: uppercase;
    margin: 0; display: flex; flex-wrap: wrap; align-items: baseline;
    justify-content: center; gap: 0 22px;
  }
  [data-composition-id="scene-01-hook"] .hero .word {
    display: inline-block; opacity: 0; transform: translateY(50px);
    will-change: transform, opacity; color: #0A6F3E;
  }
  [data-composition-id="scene-01-hook"] .hero .accent { color: #F2B705; }

  [data-composition-id="scene-01-hook"] .hero-img {
    width: 420px; height: 420px; object-fit: contain; margin: 18px 0 6px;
    opacity: 0; transform: scale(0.9);
    filter: drop-shadow(0 18px 40px rgba(200,150,30,0.18));
  }

  [data-composition-id="scene-01-hook"] .underline {
    width: 0; height: 7px;
    background: linear-gradient(90deg, #0A6F3E 0%, #5BA77C 45%, #F2B705 100%);
    border-radius: 4px; margin: 24px auto 30px;
  }

  [data-composition-id="scene-01-hook"] .chips {
    display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 40px;
  }
  [data-composition-id="scene-01-hook"] .chips .chip {
    font: 700 26px/1 'Be Vietnam Pro', sans-serif; letter-spacing: -0.01em;
    color: #2C3A30; padding: 14px 26px;
    background: #FFFFFF; border: 1px solid #F1E4BC;
    border-radius: 18px; box-shadow: 0 10px 26px rgba(190,150,40,0.10);
    opacity: 0; transform: translateY(18px) scale(0.96); will-change: transform, opacity;
  }

  [data-composition-id="scene-01-hook"] .teaser {
    display: flex; align-items: center; gap: 20px; opacity: 0;
  }
  [data-composition-id="scene-01-hook"] .teaser .pill {
    font: 800 28px/1 'Be Vietnam Pro', sans-serif;
    color: #FFFFFF; background: #0A6F3E; padding: 13px 26px; border-radius: 999px;
    box-shadow: 0 10px 26px rgba(10,111,62,0.26); flex-shrink: 0;
  }
  [data-composition-id="scene-01-hook"] .teaser .label {
    font: 600 21px/1.35 'Be Vietnam Pro', sans-serif;
    color: #5A5240; text-align: left; max-width: 560px;
  }
  [data-composition-id="scene-01-hook"] .teaser .label .strong { color: #0A6F3E; font-weight: 800; }
</style>
</head>
<body>

<div id="scene-01-root" data-composition-id="scene-01-hook" data-width="1200" data-height="1080">

  <div class="bokeh" aria-hidden="true"></div>
  <svg class="leaf" style="top:60px; left:40px;" width="150" height="185" viewBox="0 0 100 120"><path d="M50 0 C20 30 20 90 50 120 C80 90 80 30 50 0Z" fill="#F6DB52" opacity="0.5"/></svg>
  <svg class="leaf" style="bottom:50px; left:30px;" width="125" height="160" viewBox="0 0 100 120"><path d="M50 0 C20 30 20 90 50 120 C80 90 80 30 50 0Z" fill="#BDDBA9" opacity="0.6"/></svg>

  <div class="meta-badge">
    <span class="dot">●</span> DR.MAYA · MẸO CHO MẸ
  </div>

  <div class="stage">
    <div class="eyebrow">EYEBROW LINE</div>

    <h1 class="hero">
      <span class="word">HERO</span>
      <span class="word accent">TITLE</span>
    </h1>

    <!-- Content-matching illustration (AI-gen, local). onerror hides if missing. -->
    <img class="hero-img" src="assets/img/scene-01.jpg" alt="" onerror="this.style.display='none'" />

    <div class="underline"></div>

    <div class="chips">
      <div class="chip">Ý 1</div>
      <div class="chip">Ý 2</div>
      <div class="chip">Ý 3</div>
    </div>

    <div class="teaser">
      <div class="pill">KEY STAT</div>
      <div class="label">supporting line với <span class="strong">điểm nhấn</span> ở đây</div>
    </div>
  </div>

</div>

<script>
(function () {
  function mulberry32(seed) {
    return function () {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const root = document.querySelector('[data-composition-id="scene-01-hook"]');
  const DURATION = 12.382;

  (function seedBokeh() {
    const rnd = mulberry32(0x5c01);
    const layer = root.querySelector('.bokeh');
    const colors = ['#F5C433', '#F6DB52', '#BDDBA9', '#FFE9A8', '#C4DFB1'];
    const N = 65;
    for (let i = 0; i < N; i++) {
      const d = document.createElement('span');
      const size = 5 + rnd() * 11;
      d.style.width = d.style.height = size + 'px';
      d.style.background = colors[Math.floor(rnd() * colors.length)];
      d.style.left = (rnd() * 100).toFixed(2) + '%';
      d.style.top = (rnd() * 100).toFixed(2) + '%';
      layer.appendChild(d);
    }
  })();

  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  tl.fromTo(root.querySelectorAll('.leaf'),
    { opacity: 0, scale: 0.8, rotation: -8 }, { opacity: 1, scale: 1, rotation: 0, duration: 1.0, ease: 'power2.out', stagger: 0.2 }, 0);
  tl.fromTo(root.querySelector('.meta-badge'),
    { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' }, 0.2);

  const bokehSpans = root.querySelectorAll('.bokeh span');
  tl.to(bokehSpans, { opacity: 0.55, duration: 1.0, ease: 'sine.out', stagger: { each: 0.006, from: 'random' } }, 0.4);
  const driftCycles = Math.max(0, Math.ceil(DURATION / 6) - 1);
  bokehSpans.forEach((s, i) => {
    const off = (((i * 37) % 80) - 40);
    tl.to(s, { x: off, y: -off * 0.7, duration: 6, ease: 'sine.inOut', repeat: driftCycles, yoyo: true }, 1.0);
  });

  tl.fromTo(root.querySelector('.eyebrow'),
    { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' }, 1.1);

  tl.fromTo(root.querySelectorAll('.hero .word'),
    { opacity: 0, y: 50 }, { opacity: 1, y: 0, duration: 0.8, ease: 'expo.out', stagger: 0.14 }, 1.7);

  tl.fromTo(root.querySelector('.hero-img'),
    { opacity: 0, scale: 0.9, y: 20 }, { opacity: 1, scale: 1, y: 0, duration: 0.9, ease: 'expo.out' }, 2.6);

  tl.fromTo(root.querySelector('.underline'),
    { width: 0 }, { width: 520, duration: 0.9, ease: 'expo.out' }, 3.4);

  tl.fromTo(root.querySelectorAll('.chips .chip'),
    { opacity: 0, y: 18, scale: 0.96 }, { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: 'back.out(1.6)', stagger: 0.14 }, 4.1);

  tl.fromTo(root.querySelector('.teaser'),
    { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out' }, 5.4);

  window.__timelines["scene-01-hook"] = tl;
})();
</script>
</body>
</html>
